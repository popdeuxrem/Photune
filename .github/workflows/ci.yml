name: Photune CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 3. Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 4. Lint
        run: npm run lint

      - name: 5. Typecheck
        run: npm run typecheck

      - name: 6. Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: example-anon-key
          NEXT_PUBLIC_SITE_URL: https://example.com

          STRIPE_SECRET_KEY: sk_test_example
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_example
          STRIPE_WEBHOOK_SECRET: whsec_example
          STRIPE_PRO_MONTHLY_PRICE_ID: price_pro_monthly_example
          STRIPE_PRO_YEARLY_PRICE_ID: price_pro_yearly_example
          STRIPE_ENTERPRISE_MONTHLY_PRICE_ID: price_enterprise_monthly_example

          MAILGUN_API_KEY: key-example
          MAILGUN_DOMAIN: mg.example.com
          MAILGUN_FROM_EMAIL: no-reply@example.com

          GROQ_API_KEY: groq_example_key

          CLOUDFLARE_ACCOUNT_ID: cloudflare_account_example
          CLOUDFLARE_API_TOKEN: cloudflare_token_example
        run: npm run build

      - name: 7. Smoke test projects contract
        run: npm run smoke:projects

      - name: 8. Smoke test provider policy
        run: npm run smoke:providers

  deploy:
    name: Deploy to Vercel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 3. Pull Vercel project environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 4. Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 5. Deploy project artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
