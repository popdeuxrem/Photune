name: Photune CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 3. Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 4. Lint
        run: npm run lint

      - name: 5. Typecheck
        run: npm run typecheck

      - name: 6. Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: example-anon-key
          NEXT_PUBLIC_SITE_URL: https://example.com
        run: npm run build

      - name: 7. Smoke test projects contract
        run: npm run smoke:projects

      - name: 8. Smoke test provider policy
        run: npm run smoke:providers

  deploy:
    name: Deploy to Vercel
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 3. Pull Vercel project environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 4. Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 5. Deploy project artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
